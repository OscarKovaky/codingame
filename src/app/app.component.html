<div class="app-shell" [class.app-shell--light]="activeTheme === 'light'">
  <div class="app-shell__backdrop" aria-hidden="true"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">Portafolio</p>
      <h1>Oscar Ramirez Aguilar</h1>
      <p class="subtitle">Angular standalone, experiencia visual premium y enfoque real en negocio.</p>
    </div>

    <button
      type="button"
      class="theme-toggle"
      [class.theme-toggle--light]="!isDarkTheme"
      [attr.aria-pressed]="!isDarkTheme"
      [attr.aria-label]="isDarkTheme ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      (click)="toggleTheme()"
    >
      <span class="theme-toggle__track">
        <span class="theme-toggle__stars" aria-hidden="true"></span>
        <span class="theme-toggle__thumb">
          <span class="theme-toggle__sun" aria-hidden="true"></span>
          <span class="theme-toggle__moon" aria-hidden="true"></span>
        </span>
      </span>
    </button>
  </header>

  <nav class="views-nav" aria-label="Secciones principales">
    @for (view of views; track view.id) {
      <button
        type="button"
        class="views-nav__btn"
        [class.views-nav__btn--active]="activeView === view.id"
        (click)="setView(view.id)"
      >
        {{ view.label }}
      </button>
    }
  </nav>

  <main class="content">
    @switch (activeView) {
      @case ('home') {
        <app-home />
      }

      @case ('videos') {
        <app-videos />
      }

      @case ('blog') {
        <app-blog />
      }

      @case ('cv') {
        <app-cv />
      }
    }
  </main>

  <app-chatbot-widget (navigateToSection)="goToHomeSection($event)" />
</div>
