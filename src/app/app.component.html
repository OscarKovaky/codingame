<div class="app-shell" [class.app-shell--light]="activeTheme === 'light'">
  <header class="hero">
    <div>
      <p class="eyebrow">Portafolio</p>
      <h1>Home, videos, blog y CV en componentes separados</h1>
      <p class="subtitle">También puedes alternar entre modo oscuro y claro.</p>
    </div>

    <button type="button" class="theme-btn" (click)="toggleTheme()">
      Cambiar a modo {{ activeTheme === 'dark' ? 'claro' : 'oscuro' }}
    </button>
  </header>

  <nav class="views-nav" aria-label="Secciones principales">
    @for (view of views; track view.id) {
      <button
        type="button"
        class="views-nav__btn"
        [class.views-nav__btn--active]="activeView === view.id"
        (click)="setView(view.id)"
      >
        {{ view.label }}
      </button>
    }
  </nav>

  <main class="content">
    @switch (activeView) {
      @case ('home') {
        <app-home />
      }

      @case ('videos') {
        <app-videos />
      }

      @case ('blog') {
        <app-blog />
      }

      @case ('cv') {
        <app-cv />
      }
    }
  </main>
</div>
